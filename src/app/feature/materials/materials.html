<div class="materials-page">

 <div class="top-banner">
        <header>
            <h1 class="page-title">Uploaded Materials</h1>

            <div class="header-actions">
                <button class="btn-icon">
                    <i class="hgi hgi-stroke hgi-rounded hgi-bell-ring"></i>
                </button>
            </div>
        </header>
    </div>

   @for (group of groupedMaterials(); track group.gradeId) {

<div class="grade-card">

  <div class="grade-header">
    <h3>{{group.gradeName}}</h3>

    <div class="search-box">
      <i class="hgi hgi-search-01"></i>
      <input type="text" placeholder="Search files..." (input)="onSearch($any($event.target).value)">
    </div>
  </div>

  <table class="materials-table">

    <thead>
      <tr>
        <th>File link</th>
        <th>Teacher</th>
        <th>Course</th>
        <th>Type</th>
      </tr>
    </thead>

    <tbody>

      @for(item of group.materials; track item.courseId){

      <tr>
        <td>{{ item.materials }}</td>
        <td>{{ item.teacherName }}</td>
        <td>{{ item.courseName }}</td>
        <td>{{ item.materialType }}</td>
      </tr>

      }

    </tbody>

  </table>

</div>

}
</div>
