<div class="modal-overlay">

    <div class="create-exam">


        <header>

            <h2>Create New Exam</h2>

            <p>
                Fill in the details below to create a new Exam
            </p>

        </header>



        <div class="modal-body">

            <div class="form-grid">



                <div class="form-group">

                    <label>Subject</label>

                    <select>
                        <option>Select Subject</option>
                        <option>Mathematics</option>
                        <option>Physics</option>
                        <option>Chemistry</option>
                        <option>Biology</option>
                        <option>Arabic</option>
                        <option>English</option>
                    </select>

                </div>



                <div class="form-group">

                    <label>Grade</label>

                    <select>
                        <option>Select Grade</option>
                        <option>Grade 10</option>
                        <option>Grade 11</option>
                        <option>Grade 12</option>
                    </select>

                </div>



                <div class="form-group">

                    <label>Date</label>

                    <input type="date">

                </div>



                <div class="form-group">

                    <label>Time</label>

                    <input type="time">

                </div>


                <div class="form-group">

                    <label>Duration</label>

                    <input type="number" placeholder="e.g. 60">

                </div>




                <div class="form-group">

                    <label>Committee</label>

                    <select>
                        <option>Select committee</option>
                        <option>Committee A</option>
                        <option>Committee B</option>
                        <option>Committee C</option>
                    </select>

                </div>



                <div class="form-group">

                    <label>Exam Type</label>

                    <select>
                        <option>Select Type</option>
                        <option>Final</option>
                        <option>Monthly</option>
                        <option>Quiz</option>
                    </select>

                </div>


                <div class="form-group">

                    <label>Monitor 1</label>

                    <select>
                        <option>Select person</option>
                    </select>

                </div>


                <div class="form-group">

                    <label>Monitor 2</label>

                    <select>
                        <option>Select person</option>
                    </select>

                </div>



                <div class="form-group full-width">

                    <label>Notes (optional)</label>

                    <textarea rows="3"
                        placeholder="Any special requirements, room preferences, or additional information..."></textarea>

                </div>



                <div class="form-group">

                    <label>Starting ID</label>

                    <select>
                        <option>Select number</option>
                    </select>

                </div>



                <div class="form-group">

                    <label>Ending ID</label>

                    <select>
                        <option>Select number</option>
                    </select>

                </div>

            </div>

        </div>


        <div class="modal-footer">

            <app-cancel-btn></app-cancel-btn>

            <div class="footer-actions">

                <app-save-btn></app-save-btn>
                <app-publish-btn></app-publish-btn>

            </div>

        </div>

    </div>

</div>
