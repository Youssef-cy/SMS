<div class="modal-overlay">

    <div class="create-exam">

        <header>
            <h2>Create New Exam</h2>
            <p>Fill in the details below to create a new Exam</p>
        </header>

        <div class="modal-body">

            <div class="form-grid">

                <!-- Subject -->
                <div class="form-group">
                    <label>Subject</label>

                    <select [(ngModel)]="exam.courseName" name="courseName">
                        <option value="" disabled>Select Subject</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="Arabic">Arabic</option>
                        <option value="English">English</option>
                    </select>
                </div>

                <!-- Grade -->
                <div class="form-group">
                    <label>Grade</label>

                    <select [(ngModel)]="exam.gradeId" name="gradeId">
                        <option [ngValue]="0" disabled>Select Grade</option>
                        <option [ngValue]="1">Grade 10</option>
                        <option [ngValue]="2">Grade 11</option>
                        <option [ngValue]="3">Grade 12</option>
                    </select>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label>Date</label>

                    <input
                        type="date"
                        [(ngModel)]="exam.examDate"
                        name="examDate">
                </div>

                <!-- Time -->
                <div class="form-group">
                    <label>Time</label>

                    <input
                        type="time"
                        [(ngModel)]="exam.examTime"
                        name="examTime">
                </div>

                <!-- Duration -->
                <div class="form-group">
                    <label>Duration (Minutes)</label>

                    <input
                        type="number"
                        [(ngModel)]="exam.duration"
                        name="duration"
                        placeholder="120">
                </div>

                <!-- Committee -->
                <div class="form-group">
                    <label>Committee</label>

                    <select [(ngModel)]="exam.committeeName" name="committeeName">
                        <option value="" disabled>Select Committee</option>
                        <option value="Room A101">Room A101</option>
                        <option value="Room B202">Room B202</option>
                        <option value="Room C303">Room C303</option>
                        <option value="Room D404">Room D404</option>
                        <option value="Room E505">Room E505</option>
                    </select>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label>Status</label>

                    <select [(ngModel)]="exam.status" name="status">
                        <option value="Scheduled">Scheduled</option>
                        <option value="Pending">Pending</option>
                        <option value="Draft">Draft</option>
                    </select>
                </div>

            </div>

        </div>

        <div class="modal-footer">

            <app-cancel-btn></app-cancel-btn>

            <div class="footer-actions">

                <button class="save-btn" (click)="createExam()">
                    Save Exam
                </button>

            </div>

        </div>

    </div>

</div>
