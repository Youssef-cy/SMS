<div class="main-layout">
  <div class="top-navbar">
    <h2>Students</h2>
    <div class="notification-icon">
      <i class="bi bi-bell"></i>
    </div>
  </div>
  <div class="page-content">
    <div class="filter-container">
      <div class="checkbox-wrapper">
        <span class="custom-checkbox"></span>
      </div>
      <div class="select-wrapper">
        <select class="grade-select">
          <option>ALL GRADES</option>
        </select>
      </div>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search files..." class="search-input">
      </div>
    </div>
    <div class="table-container">
      <table class="students-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Grade</th>
            <th>Attendance</th>
            <th>Class</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          @for (student of studentsList; track student.id) {
            <tr>
              <td><strong [class.first-id]="student.id === '#10042'">{{ student.id }}</strong></td>
              <td>{{ student.name }}</td>
              <td>{{ student.grade }}</td>
              <td>
                <div class="attendance-container">
                  <span class="percentage" [ngClass]="getAttendanceClass(student.attendance) + '-text'">
                    {{ student.attendance }}%
                  </span>
                  <div class="progress-bar">
                    <div class="progress" 
                         [ngClass]="getAttendanceClass(student.attendance) + '-bar'" 
                         [style.width.%]="student.attendance">
                    </div>
                  </div>
                </div>
              </td>
              <td>{{ student.class }}</td>
              <td>
                <button class="view-btn" (click)="onViewStudent(student.name)">View</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
