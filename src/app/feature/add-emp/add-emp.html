<div class="modal-overlay">
  <div class="add-employee-modal">

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- HEADER -->
      <div class="modal-header">
        <h2>Add new Employee</h2>
        <p>Creates a record in Employee and Teacher table.</p>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <h3>Personal Information</h3>

        <div class="form-grid">

          <div class="form-group">
            <label>First Name *</label>
            <input type="text" formControlName="firstName">
          </div>

          <div class="form-group">
            <label>First Name (Arabic)</label>
            <input type="text" formControlName="firstNameAnArabic">
          </div>

          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" formControlName="lastName">
          </div>

          <div class="form-group">
            <label>Last Name (Arabic)</label>
            <input type="text" formControlName="lastNameAnArabic">
          </div>

          <div class="form-group">
            <label>National ID *</label>
            <input type="number" formControlName="nationalId">
          </div>

          <div class="form-group">
            <label>Email *</label>
            <input type="email" formControlName="email">
          </div>

          <div class="form-group">
            <label>Password *</label>
            <input type="password" formControlName="password">
          </div>

          <div class="form-group">
            <label>Address</label>
            <input type="text" formControlName="address">
          </div>

          <div class="form-group">
            <label>Gender</label>
            <input type="text" formControlName="gender">
          </div>

          <div class="form-group">
            <label>Nationality</label>
            <input type="text" formControlName="nationality">
          </div>

          <div class="form-group">
            <label>Birth Date</label>
            <input type="date" formControlName="birthDate">
          </div>

          <div class="form-group">
            <label>Role ID *</label>
            <input type="number" formControlName="roleId">
          </div>

          <div class="form-group">
            <label>Religion</label>
            <input type="text" formControlName="religion">
          </div>

          <div class="form-group">
            <label>Education</label>
            <input type="text" formControlName="education">
          </div>

          <div class="form-group">
            <label>Experience History</label>
            <input type="text" formControlName="employeeHistory">
          </div>

          <div class="form-group">
            <label>Years of Experience</label>
            <input type="number" formControlName="numberYearsOfExperience">
          </div>

          <div class="form-group">
            <label>Subject</label>
            <input type="text" formControlName="subject">
          </div>

          <div class="form-group">
            <label>Subject Type</label>
            <input type="text" formControlName="subjectType">
          </div>

          <div class="form-group">
            <label>Subject Description</label>
            <input type="text" formControlName="subjectDescription">
          </div>

          <div class="form-group">
            <label>Grade ID</label>
            <input type="number" formControlName="gradeId">
          </div>

          <div class="form-group">
            <label>Term ID</label>
            <input type="number" formControlName="termId">
          </div>

        </div>

        <h3>Account Settings</h3>

        <label>
          <input type="checkbox" formControlName="isDeleted">
          Mark as deleted
        </label>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">

        <app-cancel-btn
          type="button"
          (click)="cancel()">
        </app-cancel-btn>

<div class="save" (click)="submit()">
        <app-add-btn></app-add-btn>

</div>
      </div>

    </form>

  </div>
</div>
