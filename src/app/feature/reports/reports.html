<div class="reports-page">
  <div class="top-banner">
    <header>
      <h1 class="page-title">Reports</h1>

      
    </header>
  </div>
  <div class="content">
    <div class="filter-card">
      <div class="filter-group">
        <div class="input-group">
          <label>Report Type</label>

          <select [(ngModel)]="selectedType">
            <option value="">All</option>

            @for (type of reportTypes(); track type) {
              <option [value]="type">
                {{ type }}
              </option>
            }
          </select>
        </div>

        <div class="input-group">
          <label>Create Date</label>

          <input type="date" [(ngModel)]="selectedDate" />
        </div>

        <button class="btn-filter" (click)="filterReports()">Filter</button>

        <div class="clear" (onclick)="resetFilter()">
          Clear
        </div>

      </div>
    </div>

    <div class="card">
      <div class="card-title">All Reports</div>

      <table class="reports-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>firstName</th>
            <th>Role</th>
            <th>type</th>
            <th>content</th>
            <th>fileLink</th>
            <th>creationDate</th>
          </tr>
        </thead>

        <tbody></tbody>
        <tbody>
          @for (report of data(); track report.id) {
            <tr>
              <td>{{ report.id }}</td>

              <td>
                <span class="badge-attendance">
                  {{ report.firstName }}
                </span>
              </td>
              <td>
                {{ report.role }}
              </td>
              <td>{{ report.type }}</td>
              <td>
                {{ report.content }}
              </td>

              <td>
                {{ report.fileLink }}
              </td>

              <td>
                {{ report.creationDate }}
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
