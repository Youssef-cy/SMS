<div class="filter-bar">
  <div class="filter-group">
    <div class="filter-field">
      <label for="viewType">Grade</label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedGrade" (change)="onGradeChange()">
          <option value="all">All Grades</option>
          @for (grade of grades(); track grade) {
            <option [value]="grade">{{ grade }}</option>
          }
        </select>
      </div>
    </div>

    <div class="filter-field">
      <label for="class">Class</label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedClass" (change)="emitFilter()">
          <option value="all" selected>Select Class</option>
          @for (class of getFilteredClasses(); track class.id) {
            <option [value]="class.id">{{ class.className }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <div class="filter-badge"></div>
</div>

<div class="info-banner">
  <span class="info-icon">✏️</span>
  <span class="info-text"
    >Click any cell to type directly. Press Tab to move to the next slot.</span
  >
</div>
