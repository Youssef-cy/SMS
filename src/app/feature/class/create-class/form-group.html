   <form [formGroup]="classForm" class="modal-body">
      <div class="form-group">
        <label>Class name<span class="required">*</span></label>
        <input
          type="text"
          formControlName="className"
          placeholder="e.g. 10-A"
          [class.input-error]="f['className'].invalid && f['className'].touched">
      </div>
      <div class="form-group">
        <label>Grade<span class="required">*</span></label>
        <select
          formControlName="grade"
          [class.input-error]="f['grade'].invalid && f['grade'].touched">
          <option value="" disabled selected>Select Grade</option>
          <option *ngFor="let g of grades" [value]="g.id">{{ g.grade }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Capacity<span class="required">*</span></label>
        <input
          type="number"
          formControlName="capacity"
          placeholder="e.g. 20"
          [class.input-error]="f['capacity'].invalid && f['capacity'].touched">
      </div>
      <div class="form-actions" style="display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end;">
        <button type="button" class="btn" (click)="onCancel()" style="background-color: transparent; border: 1px solid #ccc; color: #333;">Cancel</button>
        <button type="submit" class="btn" (click)="onSubmit()">Save</button>
      </div>
    </form>
