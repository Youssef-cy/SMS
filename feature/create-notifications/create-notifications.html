<div class="announcements-page">

   
    <div class="top-banner">
        <h1 class="page-title">Create Notifications</h1>
    </div>

    <div class="announcement-card">

        <div class="form-grid">

        
            <div class="form-group">
                <label>Announcement Type</label>

                <select>
                    <option>Select Type</option>
                    <option>Academic</option>
                    <option>Activity</option>
                    <option>Finance</option>
                    <option>General</option>
                </select>
            </div>

            <div class="form-group">
                <label>Title</label>

                <input
                    type="text"
                    placeholder="Title">
            </div>


            <div class="form-group">
                <label>Priority</label>

                <select>
                    <option>Select Priority</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>

            <div class="form-group">
                <label>Receiver</label>

                <select>
                    <option>Select Person</option>
                    <option>Students</option>
                    <option>Teachers</option>
                    <option>Parents</option>
                    <option>All Users</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Notes (optional)</label>

                <textarea
                    rows="8"
                    placeholder="Any special requirements, room preferences, or additional information..."></textarea>
            </div>

        </div>

  <div class="form-footer">

    <app-cancel-btn></app-cancel-btn>

    <div class="footer-buttons">
        <app-save-btn></app-save-btn>
        <app-publish-btn></app-publish-btn>
    </div>

</div>

    </div>

</div>
